server {
    listen 3000;
    server_name localhost;

    # Enable aggressive Gzip compression maps natively dynamically bounding payloads securely
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Mapping Dashboard build targets directly explicitly mapping paths
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy pass logically merging backends aggressively routing payloads gracefully
    location /api/ {
        proxy_pass http://fastapi-app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal websocket path forwarding implicitly explicitly
    location /ws/ {
        proxy_pass http://fastapi-app:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
